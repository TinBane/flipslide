<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <!-- Angled base gradient — darker bottom-right -->
    <linearGradient id="base" x1="0" y1="0" x2=".8" y2="1">
      <stop offset="0%" stop-color="#111d32"/>
      <stop offset="100%" stop-color="#080d19"/>
    </linearGradient>

    <!-- Primary accent wash — soft elliptical glow, top-left -->
    <radialGradient id="wash" cx="8%" cy="8%" r="55%" fx="5%" fy="5%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity=".30"/>
      <stop offset="35%" stop-color="#38bdf8" stop-opacity=".12"/>
      <stop offset="70%" stop-color="#38bdf8" stop-opacity=".03"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>

    <!-- Secondary wash — wider, softer, pulled diagonally -->
    <radialGradient id="wash2" cx="18%" cy="22%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity=".10"/>
      <stop offset="60%" stop-color="#38bdf8" stop-opacity=".02"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>

    <!-- Horizontal bar fade -->
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity=".45"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>

    <!-- Vertical rhythm lines -->
    <linearGradient id="vbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>

    <!-- Fine angled grid -->
    <pattern id="agrid" width="96" height="96" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
      <path d="M96 0V96H0" fill="none" stroke="#38bdf8" stroke-opacity=".055" stroke-width=".5"/>
    </pattern>
  </defs>

  <!-- 1. Base -->
  <rect width="1920" height="1080" fill="url(#base)"/>

  <!-- 2. Rotated grid -->
  <rect width="2400" height="2400" x="-240" y="-660" fill="url(#agrid)"/>

  <!-- 3. Soft accent washes (replaces hard diagonal sweep + facets) -->
  <rect width="1920" height="1080" fill="url(#wash)"/>
  <rect width="1920" height="1080" fill="url(#wash2)"/>

  <!-- 4. Soft curved accent arcs — top left, organic flow -->
  <path d="M0,0 Q400,80 200,500" fill="none" stroke="#38bdf8" stroke-opacity=".10" stroke-width=".75"/>
  <path d="M0,0 Q600,120 350,700" fill="none" stroke="#38bdf8" stroke-opacity=".07" stroke-width=".5"/>
  <path d="M0,0 Q250,200 80,600" fill="none" stroke="#38bdf8" stroke-opacity=".06" stroke-width=".5"/>

  <!-- 5. Horizontal data bars — emanating from the left edge -->
  <rect x="0" y="180" width="520" height="1" fill="url(#bar)" opacity=".7"/>
  <rect x="0" y="320" width="380" height="1" fill="url(#bar)" opacity=".5"/>
  <rect x="0" y="460" width="440" height="1" fill="url(#bar)" opacity=".6"/>
  <rect x="0" y="600" width="300" height="1" fill="url(#bar)" opacity=".4"/>
  <rect x="0" y="740" width="360" height="1" fill="url(#bar)" opacity=".45"/>
  <rect x="0" y="880" width="260" height="1" fill="url(#bar)" opacity=".3"/>

  <!-- 6. Accent dots along a gentle curve -->
  <circle cx="60" cy="50" r="3" fill="#38bdf8" opacity=".55"/>
  <circle cx="160" cy="130" r="2.2" fill="#38bdf8" opacity=".45"/>
  <circle cx="300" cy="250" r="2.8" fill="#38bdf8" opacity=".40"/>
  <circle cx="420" cy="340" r="2" fill="#38bdf8" opacity=".32"/>
  <circle cx="540" cy="430" r="2.5" fill="#38bdf8" opacity=".28"/>
  <circle cx="200" cy="400" r="1.5" fill="#38bdf8" opacity=".22"/>
  <circle cx="80" cy="280" r="1.3" fill="#38bdf8" opacity=".20"/>
  <circle cx="380" cy="180" r="1.8" fill="#38bdf8" opacity=".25"/>
  <!-- Connecting filaments -->
  <line x1="60" y1="50" x2="160" y2="130" stroke="#38bdf8" stroke-opacity=".20" stroke-width=".5"/>
  <line x1="160" y1="130" x2="300" y2="250" stroke="#38bdf8" stroke-opacity=".16" stroke-width=".5"/>
  <line x1="300" y1="250" x2="420" y2="340" stroke="#38bdf8" stroke-opacity=".13" stroke-width=".5"/>
  <line x1="420" y1="340" x2="540" y2="430" stroke="#38bdf8" stroke-opacity=".10" stroke-width=".5"/>
  <line x1="160" y1="130" x2="380" y2="180" stroke="#38bdf8" stroke-opacity=".10" stroke-width=".5"/>
  <line x1="300" y1="250" x2="200" y2="400" stroke="#38bdf8" stroke-opacity=".09" stroke-width=".5"/>

  <!-- 7. Vertical rhythm markers on the right half -->
  <rect x="1200" y="100" width="1" height="880" fill="url(#vbar)" opacity=".6"/>
  <rect x="1440" y="150" width="1" height="780" fill="url(#vbar)" opacity=".45"/>
  <rect x="1680" y="200" width="1" height="680" fill="url(#vbar)" opacity=".35"/>

  <!-- 8. Concentric arcs — bottom right (counterweight) -->
  <path d="M1920,1080 Q1920,820 1660,820" fill="none" stroke="#38bdf8" stroke-opacity=".09" stroke-width=".75"/>
  <path d="M1920,1080 Q1920,700 1540,700" fill="none" stroke="#38bdf8" stroke-opacity=".06" stroke-width=".5"/>
  <path d="M1920,1080 Q1920,580 1420,580" fill="none" stroke="#38bdf8" stroke-opacity=".04" stroke-width=".5"/>

  <!-- 9. Sparse far-field nodes -->
  <circle cx="1400" cy="200" r="1.3" fill="#38bdf8" opacity=".14"/>
  <circle cx="1700" cy="400" r="1.5" fill="#38bdf8" opacity=".12"/>
  <circle cx="1100" cy="900" r="1.8" fill="#38bdf8" opacity=".16"/>
  <circle cx="1800" cy="750" r="1.3" fill="#38bdf8" opacity=".09"/>
  <circle cx="900" cy="100" r="1.5" fill="#38bdf8" opacity=".11"/>
</svg>
