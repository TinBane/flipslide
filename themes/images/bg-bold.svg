eft --><circle cx="240" cy="880" r="2.5" fill="#38bdf8" opacity=".42"></circle><circle cx="120" cy="800" r="2" fill="#38bdf8" opacity=".32"></circle><circle cx="350" cy="760" r="2.2" fill="#38bdf8" opacity=".28"></circle><circle cx="80" cy="960" r="1.8" fill="#38bdf8" opacity=".22"></circle><circle cx="400" cy="920" r="2.8" fill="#38bdf8" opacity=".35"></circle><line x1="240" y1="880" x2="120" y2="800" stroke="#38bdf8" stroke-opacity=".14" stroke-width=".5"></line><line x1="240" y1="880" x2="350" y2="760" stroke="#38bdf8" stroke-opacity=".12" stroke-width=".5"></line><line x1="240" y1="880" x2="400" y2="920" stroke="#38bdf8" stroke-opacity=".13" stroke-width=".5"></line><line x1="240" y1="880" x2="80" y2="960" stroke="#38bdf8" stroke-opacity=".09" stroke-width=".5"></line><line x1="120" y1="800" x2="350" y2="760" stroke="#38bdf8" stroke-opacity=".08" stroke-width=".5"></line><!-- 10. Lone sentinel nodes in quiet zones --><circle cx="960" cy="60" r="1.5" fill="#38bdf8" opacity=".16"></circle><circle cx="100" cy="200" r="1.8" fill="#38bdf8" opacity=".14"></circle><circle cx="1850" cy="540" r="1.3" fill="#38bdf8" opacity=".12"></circle><circle cx="700" cy="1020" r="1.6" fill="#38bdf8" opacity=".14"></circle><circle cx="1300" cy="980" r="1.3" fill="#38bdf8" opacity=".10"></circle><!-- 11. Crossing meridian lines --><line x1="0" y1="0" x2="1920" y2="1080" stroke="url(#diag)" stroke-width=".75" opacity=".7"></line><line x1="300" y1="0" x2="1920" y2="780" stroke="#38bdf8" stroke-opacity=".04" stroke-width=".5"></line><line x1="0" y1="300" x2="1620" y2="1080" stroke="#38bdf8" stroke-opacity=".035" stroke-width=".5"></line></svg>