<?xml version="1.0" standalone="yes"?><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" style="zoom: 1;"><defs><!-- Deep radial base — slightly lifted in center for text readability --><radialGradient id="base" cx="38%" cy="42%" r="72%" fx="38%" fy="42%"><stop offset="0%" stop-color="#151f35"></stop><stop offset="55%" stop-color="#0f172a"></stop><stop offset="100%" stop-color="#070b15"></stop></radialGradient><!-- Accent glow — bottom right cluster --><radialGradient id="glow-br" cx="78%" cy="72%" r="40%"><stop offset="0%" stop-color="#38bdf8" stop-opacity=".18"></stop><stop offset="100%" stop-color="#38bdf8" stop-opacity="0"></stop></radialGradient><!-- Accent glow — top left whisper --><radialGradient id="glow-tl" cx="12%" cy="18%" r="30%"><stop offset="0%" stop-color="#38bdf8" stop-opacity=".09"></stop><stop offset="100%" stop-color="#38bdf8" stop-opacity="0"></stop></radialGradient><!-- Diagonal line gradient --><linearGradient id="diag" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#38bdf8" stop-opacity=".18"></stop><stop offset="100%" stop-color="#38bdf8" stop-opacity="0"></stop></linearGradient><!-- Fine grid --><pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse"><path d="M72 0V72H0" fill="none" stroke="#38bdf8" stroke-opacity=".07" stroke-width=".5"></path></pattern><!-- Dot field pattern — scattered data points --><pattern id="dots" width="240" height="240" patternUnits="userSpaceOnUse"><circle cx="30" cy="45" r="1.2" fill="#38bdf8" opacity=".16"></circle><circle cx="180" cy="20" r="1" fill="#38bdf8" opacity=".12"></circle><circle cx="120" cy="190" r="1.4" fill="#38bdf8" opacity=".14"></circle><circle cx="210" cy="130" r=".9" fill="#38bdf8" opacity=".10"></circle><circle cx="60" cy="160" r="1.1" fill="#38bdf8" opacity=".12"></circle></pattern></defs><!-- 1. Deep base --><rect width="1920" height="1080" fill="url(#base)"></rect><!-- 2. Grid overlay --><rect width="1920" height="1080" fill="url(#grid)"></rect><!--